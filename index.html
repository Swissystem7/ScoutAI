<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ScoutAI | מעבדת סקאוטינג</title><style>
:root{--ink:#17211b;--muted:#637168;--paper:#f3f6f1;--card:#fff;--accent:#176b48;--line:#dbe4dc}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 85% 0,#d9eee1,transparent 32%),var(--paper);color:var(--ink);font-family:Arial,sans-serif;min-height:100vh}.shell{max-width:1060px;margin:auto;padding:38px 20px 60px}header{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:24px}.eyebrow{color:var(--accent);font-size:.82rem;font-weight:800;letter-spacing:.12em}h1{font-size:clamp(2.2rem,6vw,4.5rem);line-height:.95;margin:8px 0}header p{max-width:520px;color:var(--muted);line-height:1.6}.grid{display:grid;grid-template-columns:340px 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 12px 35px #213b2910}h2{margin:0 0 16px;font-size:1.1rem}label{display:block;margin:13px 0 6px;color:var(--muted);font-size:.86rem}input{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fbfcfa}button{width:100%;margin-top:18px;padding:13px;border:0;border-radius:12px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.score{display:flex;align-items:center;gap:18px;padding-bottom:18px;border-bottom:1px solid var(--line)}.dial{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--accent) calc(var(--score)*1%),#e5ebe6 0);position:relative}.dial:after{content:"";position:absolute;inset:9px;border-radius:50%;background:white}.dial strong{z-index:1;font-size:1.7rem}.components{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:15px}.metric,.player{padding:12px;background:#f5f8f4;border-radius:12px}.metric span,.muted{font-size:.78rem;color:var(--muted)}.metric b{display:block;margin-top:5px}.ranking{margin-top:18px}.player{display:grid;grid-template-columns:38px 1fr auto;align-items:center;margin:8px 0}.rank{color:var(--accent);font-weight:900}.tag{padding:5px 8px;border-radius:99px;background:#e3f2e8;color:var(--accent);font-size:.74rem}.error{color:#a33131;background:#fff1f1;padding:12px;border-radius:10px}@media(max-width:760px){header{display:block}.grid{grid-template-columns:1fr}.components{grid-template-columns:1fr 1fr}}
</style></head><body><main class="shell"><header><div><div class="eyebrow">SCOUTAI / LIVE LAB</div><h1>לראות מעבר לסטטיסטיקה.</h1></div><p>מדד השפעה שקוף וסריקת פרוספקטים על בסיס מנועי הדירוג האמיתיים של ScoutAI. הנתונים בדמו הם להמחשה בלבד.</p></header><section class="grid"><form class="card" id="form"><h2>פרופיל למשחק</h2><label>שם שחקן</label><input id="name" value="נועם לוי"><label>לחצים ל־90 דקות</label><input id="pressures" type="number" value="10" min="0"><label>פעולות הגנה (תיקולים + חטיפות)</label><input id="defense" type="number" value="50" min="0"><label>מסירות + נשיאות מקדמות</label><input id="progressive" type="number" value="160" min="0"><label>פעולות יוצרות בעיטה ל־90</label><input id="sca" type="number" step="0.1" value="5"><button>חשב והשווה</button></form><div class="card"><div id="result"></div></div></section></main><script>
/*__LIB_BUNDLE__*/
const Scout={...__require('lib/impactScore.js'),...__require('lib/rankProspects.js')};
const demoProspects=[{id:'tal-9',sport:'football',position:'FW',age:19,minutes:900,stats:{pressures90:8,tackles:18,interceptions:9,progPasses:85,progCarries:110,sca90:4.9,carriesIntoBox90:4.2,gca90:.55,npxG90:.42},subject:{heightCm:181,weightKg:74,sprint30mSec:4.02,verticalJumpCm:56}},{id:'maya-6',sport:'football',position:'CM',age:20,minutes:900,stats:{pressures90:11,tackles:31,interceptions:38,progPasses:155,progCarries:72,sca90:5.5,carriesIntoBox90:2.1,gca90:.42,npxG90:.18},subject:{heightCm:169,weightKg:62,sprint30mSec:4.2,verticalJumpCm:48}},{id:'ron-4',sport:'football',position:'CB',age:18,minutes:900,stats:{pressures90:7,tackles:45,interceptions:52,progPasses:120,progCarries:28,sca90:1.4,carriesIntoBox90:.3,gca90:.08,npxG90:.04},subject:{heightCm:188,weightKg:82,sprint30mSec:4.35,verticalJumpCm:61}}];
const $=id=>document.getElementById(id),n=id=>Number($(id).value)||0,esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function run(e){if(e)e.preventDefault();try{const player={minutes:900,stats:{pressures90:n('pressures'),tackles:n('defense')*.58,interceptions:n('defense')*.42,progPasses:n('progressive')*.62,progCarries:n('progressive')*.38,sca90:n('sca'),carriesIntoBox90:3,gca90:.4,npxG90:.28}};const impact=Scout.impactScore(player);const ranked=Scout.rankProspects(demoProspects,{limit:3});$('result').innerHTML=`<div class="score"><div class="dial" style="--score:${impact.score}"><strong>${impact.score}</strong></div><div><div class="muted">IMPACT SCORE</div><h2>${esc($('name').value)}</h2><div class="muted">מתוך 100 · שכבת האנרגיה כבויה ללא נתוני CV</div></div></div><div class="components">${[['נחישות',impact.components.grit],['מעורבות',impact.components.involvement],['קלאץ׳',impact.components.clutch]].map(x=>`<div class="metric"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div><div class="ranking"><h2>דירוג פרוספקטים לדוגמה</h2>${ranked.map(p=>`<div class="player"><div class="rank">#${p.rank}</div><div><b>${p.id}</b><div class="muted">ביטחון ${Math.round(p.confidence*100)}% · פער ערך ${p.valueGap}</div></div><span class="tag">${p.tier} · ${p.index}</span></div>`).join('')}</div>`}catch(err){$('result').innerHTML=`<div class="error">${esc(err.message)}</div>`}}$('form').addEventListener('submit',run);run();
</script></body></html>
